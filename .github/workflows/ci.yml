name: CI

# main으로 가는 모든 push와 모든 PR에 대해 빌드 + lint 검증.
# release를 만들지 않으므로 부담 없이 자주 실행됨.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      # installer가 `include_bytes!("../../target/release/main64.exe")`로
      # proxy 산출물을 임베드하므로, clippy/build 어떤 단계든 installer를
      # 건드리려면 main64.exe가 먼저 존재해야 함.
      - name: Build proxy first (produces main64.exe for installer to embed)
        run: cargo build --release -p whisper-proxy

      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Build installer
        run: cargo build --release -p whisper-proxy-installer
